name: Verify Build (Cross-Platform)

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to verify'
        required: true
        type: number
      ref:
        description: 'Git ref to build (branch or SHA)'
        required: true
        type: string

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  test:
    name: Tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Run tests
        run: dotnet test PolyPilot.Tests --configuration Release --verbosity normal

  build-catalyst:
    name: Build Mac Catalyst
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Select Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -rV | head -1)
          if [ -z "$XCODE_PATH" ]; then
            XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -rV | head -1)
          fi
          echo "Selected Xcode: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH"

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Build Mac Catalyst
        run: dotnet build PolyPilot -f net10.0-maccatalyst -c Release

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Build Windows
        run: dotnet build PolyPilot -f net10.0-windows10.0.19041.0 -c Release

  report:
    name: Report Results
    runs-on: ubuntu-latest
    needs: [test, build-catalyst, build-windows]
    if: always()
    steps:
      - name: Post result to PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR=${{ inputs.pr_number }}
          TEST="${{ needs.test.result }}"
          CATALYST="${{ needs.build-catalyst.result }}"
          WINDOWS="${{ needs.build-windows.result }}"

          if [ "$TEST" = "success" ] && [ "$CATALYST" = "success" ] && [ "$WINDOWS" = "success" ]; then
            STATUS="✅ All platforms verified"
            EMOJI="white_check_mark"
          else
            STATUS="❌ Platform verification failed"
            EMOJI="x"
          fi

          BODY="## Cross-Platform Verification — PR #${PR}

          | Platform | Status |
          |----------|--------|
          | Tests (macOS) | $([ \"$TEST\" = 'success' ] && echo '✅' || echo '❌') $TEST |
          | Mac Catalyst build | $([ \"$CATALYST\" = 'success' ] && echo '✅' || echo '❌') $CATALYST |
          | Windows build | $([ \"$WINDOWS\" = 'success' ] && echo '✅' || echo '❌') $WINDOWS |

          **${STATUS}**

          Triggered by: [verify-build run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"

          gh pr comment "$PR" --body "$BODY"
