name: "PolyPilot Integration Test"

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to analyze (optional)'
        required: false
        type: number
      scenario:
        description: 'Test scenario to run (smoke, full)'
        required: false
        type: choice
        options:
          - smoke
          - full
        default: smoke
  push:
    branches:
      - 'feature/polypilot-ci-integration'
    paths:
      - '.github/workflows/polypilot-integration.yml'

jobs:
  integration-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Install GTK4 dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libadwaita-1-dev libwebkitgtk-6.0-dev xvfb

      - name: Install MAUI workload
        run: dotnet workload install maui-android

      - name: Install MauiDevFlow CLI
        run: |
          dotnet tool install --global Microsoft.Maui.Cli \
            --add-source https://pkgs.dev.azure.com/dnceng/public/_packaging/dotnet10/nuget/v3/index.json \
            --prerelease || true
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Build PolyPilot.Gtk (Debug — includes MauiDevFlow)
        run: |
          dotnet build PolyPilot.Gtk/PolyPilot.Gtk.csproj \
            -c Debug \
            --disable-build-servers \
            -p:UseSharedCompilation=false \
            -nodeReuse:false

      - name: Find built binary
        id: find-binary
        run: |
          BINARY=$(find PolyPilot.Gtk/bin/Debug -name "PolyPilot.Gtk" -type f -executable | head -1)
          if [ -z "$BINARY" ]; then
            echo "Binary not found, searching more broadly..."
            find PolyPilot.Gtk/bin/Debug -type f -executable | head -20
            BINARY=$(find PolyPilot.Gtk/bin/Debug -name "PolyPilot*" -type f -executable | head -1)
          fi
          echo "binary=$BINARY" >> $GITHUB_OUTPUT
          echo "Found binary: $BINARY"

      - name: Start MauiDevFlow broker
        run: |
          maui devflow broker start || echo "Broker start returned non-zero (may already be running)"
          sleep 2
          maui devflow broker status || echo "Broker status check failed"

      - name: Launch PolyPilot under xvfb
        run: |
          echo "Starting PolyPilot.Gtk under virtual display..."
          export DISPLAY=:99
          Xvfb :99 -screen 0 1920x1080x24 &
          XVFB_PID=$!
          echo "XVFB_PID=$XVFB_PID" >> $GITHUB_ENV
          sleep 2

          # Launch PolyPilot in background, capture stderr
          ${{ steps.find-binary.outputs.binary }} 2>/tmp/polypilot-stderr.log &
          APP_PID=$!
          echo "APP_PID=$APP_PID" >> $GITHUB_ENV
          echo "PolyPilot launched with PID $APP_PID"

          # Wait for startup
          sleep 15
          
          # Verify process is still running
          if kill -0 $APP_PID 2>/dev/null; then
            echo "✅ PolyPilot is running"
          else
            echo "❌ PolyPilot crashed on startup"
            exit 1
          fi

      - name: Discover MauiDevFlow agent port
        id: devflow
        run: |
          export DISPLAY=:99
          echo "Waiting for MauiDevFlow agent..."
          
          # Try broker-based discovery first
          maui devflow wait --timeout 60 --json > /tmp/devflow-wait.json 2>&1 || true
          cat /tmp/devflow-wait.json || true
          
          # Try to get the port from the broker
          AGENT_PORT=$(maui devflow list --json 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0]['port'] if d else '')" 2>/dev/null || echo "")
          
          if [ -z "$AGENT_PORT" ]; then
            echo "Broker discovery failed, trying direct port scan..."
            # The agent typically binds to 9223 or a port in 9223-9230 range
            for port in 9223 9224 9225 9226 9227 9228 9229 9230; do
              if curl -s --max-time 2 http://localhost:$port/api/status > /dev/null 2>&1; then
                AGENT_PORT=$port
                echo "Found agent on port $port"
                break
              fi
            done
          fi
          
          if [ -z "$AGENT_PORT" ]; then
            echo "⚠️ Could not discover agent port"
            echo "Checking what's listening..."
            ss -tlnp | grep -E '922[0-9]' || echo "Nothing on 9223-9230"
            echo "App process status:"
            kill -0 $APP_PID 2>/dev/null && echo "App is running (PID $APP_PID)" || echo "App crashed"
            echo "agent_port=" >> $GITHUB_OUTPUT
          else
            echo "✅ MauiDevFlow agent on port $AGENT_PORT"
            echo "agent_port=$AGENT_PORT" >> $GITHUB_OUTPUT
            curl -s http://localhost:$AGENT_PORT/api/status || true
          fi

      - name: "Smoke Test: MAUI status"
        if: steps.devflow.outputs.agent_port != ''
        run: |
          export DISPLAY=:99
          PORT=${{ steps.devflow.outputs.agent_port }}
          echo "=== Agent Status ==="
          maui devflow MAUI status --agent-port $PORT || echo "MAUI status failed"

      - name: "Smoke Test: Visual tree"
        if: steps.devflow.outputs.agent_port != ''
        run: |
          export DISPLAY=:99
          PORT=${{ steps.devflow.outputs.agent_port }}
          echo "=== Visual Tree ==="
          maui devflow MAUI tree --depth 5 --agent-port $PORT || echo "Tree inspection failed"

      - name: "Smoke Test: Screenshot"
        if: steps.devflow.outputs.agent_port != ''
        run: |
          export DISPLAY=:99
          PORT=${{ steps.devflow.outputs.agent_port }}
          echo "=== Taking screenshot ==="
          maui devflow MAUI screenshot --output /tmp/polypilot-ci-screenshot.png --agent-port $PORT || echo "Screenshot failed"

      - name: "Smoke Test: CDP/Blazor status"
        if: steps.devflow.outputs.agent_port != ''
        run: |
          export DISPLAY=:99
          PORT=${{ steps.devflow.outputs.agent_port }}
          echo "=== CDP Status ==="
          maui devflow cdp status --agent-port $PORT || echo "CDP status failed"

      - name: "Smoke Test: Application logs"
        if: steps.devflow.outputs.agent_port != ''
        run: |
          export DISPLAY=:99
          PORT=${{ steps.devflow.outputs.agent_port }}
          echo "=== Recent logs ==="
          timeout 5 maui devflow MAUI logs --agent-port $PORT || true

      - name: "Diagnostics (if agent not found)"
        if: steps.devflow.outputs.agent_port == ''
        run: |
          echo "=== Process list ==="
          ps aux | grep -i polypilot || true
          echo "=== Listening ports ==="
          ss -tlnp 2>/dev/null || netstat -tlnp 2>/dev/null || true
          echo "=== App stderr (if captured) ==="
          cat /tmp/polypilot-stderr.log 2>/dev/null || echo "No stderr log"

      - name: Upload screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: polypilot-screenshot
          path: /tmp/polypilot-ci-screenshot.png
          if-no-files-found: ignore

      - name: Cleanup
        if: always()
        run: |
          kill $APP_PID 2>/dev/null || true
          kill $XVFB_PID 2>/dev/null || true
